<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Laudo — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--border:#1f2937;--accent:#3b82f6;--accent2:#06b6d4;--text:#f9fafb;--muted:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;z-index:0;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%)}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.5)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
h1{font-size:24px;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div>
      <div class="logo-text">Sistema Laudo</div>
      <div class="logo-sub">CONTROLE DE DEVOLUÇÕES</div>
    </div>
  </div>
  <h1>Bem-vindo</h1>
  <p class="subtitle">Acesse com suas credenciais para continuar</p>
  <div class="error" id="erro"></div>
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••">
  </div>
  <button class="btn" id="btnLogin">Entrar</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var _client = supabase.createClient(
  'https://jsppfrdhkekkkjemkzju.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzcHBmcmRoa2Vra2tqZW1remp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc2MDIsImV4cCI6MjA4OTE3MzYwMn0.okK6pdZdhIcj9L_sLvLsc-iVnU_irisJoF1dDlSMbGg'
)
_client.auth.getSession().then(function(r){
  if(r.data && r.data.session) location.href='dashboard.html'
})
document.getElementById('senha').onkeydown=function(e){if(e.key==='Enter')fazerLogin()}
document.getElementById('btnLogin').onclick=fazerLogin
function fazerLogin(){
  var email=document.getElementById('email').value.trim()
  var senha=document.getElementById('senha').value
  var btn=document.getElementById('btnLogin')
  var erro=document.getElementById('erro')
  erro.style.display='none'
  if(!email||!senha){erro.textContent='Preencha e-mail e senha.';erro.style.display='block';return}
  btn.disabled=true
  btn.innerHTML='<span class="spinner"></span>Entrando...'
  _client.auth.signInWithPassword({email:email,password:senha}).then(function(r){
    if(r.error){
      erro.textContent='Erro: '+r.error.message
      erro.style.display='block'
      btn.disabled=false
      btn.innerHTML='Entrar'
    }else{
      location.href='dashboard.html'
    }
  })
}
</script>
</body>
</html>

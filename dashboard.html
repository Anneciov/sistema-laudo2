<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SLA Médio por Filial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>
    body {
        background: #0b1220;
        color: white;
        font-family: Arial;
    }
    canvas {
        max-width: 1000px;
        margin: 40px auto;
        display: block;
    }
</style>
</head>

<body>

<canvas id="grafico"></canvas>

<script>
// ==============================
// MOCK DE DADOS (substituir pelo seu)
// ==============================
const dados = [
    { filial: "F1006", status: "CONCLUÍDO", data_abertura: "2026-03-01", data_conclusao: "2026-03-05" },
    { filial: "F1006", status: "PENDENTE", data_abertura: "2026-03-02" },
    { filial: "F1038", status: "CONCLUÍDO", data_abertura: "2026-03-01", data_conclusao: "2026-03-03" },
    { filial: "F1038", status: "EM ANÁLISE", data_abertura: "2026-03-02" },
    { filial: "F1021", status: "PENDENTE", data_abertura: "2026-03-01" }
];

// ==============================
// FUNÇÃO SLA MÉDIO
// ==============================
function calcularSLAPorFilial(dados) {
    const resultado = {};

    dados.forEach(item => {
        if (!item.filial || !item.status || !item.data_abertura) return;

        const status = item.status.toUpperCase();

        // Ignorar status
        if (status === "AGUARDANDO" || status === "EM ANÁLISE") return;

        const dataInicio = new Date(item.data_abertura);
        if (isNaN(dataInicio)) return;

        const dataFim = item.data_conclusao
            ? new Date(item.data_conclusao)
            : new Date();

        if (isNaN(dataFim)) return;

        const sla = (dataFim - dataInicio) / (1000 * 60 * 60 * 24);

        if (!resultado[item.filial]) {
            resultado[item.filial] = { total: 0, qtd: 0 };
        }

        resultado[item.filial].total += sla;
        resultado[item.filial].qtd += 1;
    });

    const labels = [];
    const valores = [];

    Object.keys(resultado).forEach(filial => {
        const media = resultado[filial].total / resultado[filial].qtd;

        if (resultado[filial].qtd > 0) {
            labels.push(filial);
            valores.push(Number(media.toFixed(1)));
        }
    });

    return { labels, valores };
}

// ==============================
// GERAR GRÁFICO
// ==============================
const { labels, valores } = calcularSLAPorFilial(dados);

const ctx = document.getElementById('grafico');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'SLA Médio (dias)',
            data: valores,
            backgroundColor: 'rgba(0, 255, 200, 0.3)',
            borderColor: 'rgba(0, 255, 200, 1)',
            borderWidth: 1,
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: {
                    color: 'white'
                }
            },
            tooltip: {
                enabled: false // remove hover
            },
            datalabels: {
                color: '#00FFC8',
                anchor: 'end',
                align: 'top',
                formatter: (value) => value + ' d',
                font: {
                    weight: 'bold'
                }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                beginAtZero: true,
                ticks: { color: 'white' },
                title: {
                    display: true,
                    text: 'Dias',
                    color: 'white'
                }
            }
        }
    },
    plugins: [ChartDataLabels]
});
</script>

</body>
</html>

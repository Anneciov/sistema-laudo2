<script>
Chart.register(ChartDataLabels)

// ==============================
// CONFIG
// ==============================
const CONFIG = {
  PAGE_SIZE: 1000,
  AUTO_REFRESH: 60000
}

// ==============================
// STATE GLOBAL (PROFISSIONAL)
// ==============================
const state = {
  dados: [],
  filtrado: [],
  charts: {},
  filtros: {
    filial: '',
    status: ''
  },
  autoRefresh: null
}

// ==============================
// SUPABASE
// ==============================
const _sb = supabase.createClient(
  'https://jsppfrdhkekkkjemkzju.supabase.co',
  'SUA_ANON_KEY_AQUI'
)

// ==============================
// INIT
// ==============================
init()

async function init(){
  try{
    await autenticar()
    await carregar()
    startAutoRefresh()
  }catch(e){
    erro('Falha na inicialização', e)
  }
}

// ==============================
// AUTH
// ==============================
async function autenticar(){
  const { data } = await _sb.auth.getSession()
  if(!data.session){
    location.href = 'index.html'
    return
  }

  const u = data.session.user
  document.getElementById('uName').textContent = u.email.split('@')[0]
  document.getElementById('uEmail').textContent = u.email
  document.getElementById('av').textContent = u.email[0].toUpperCase()
}

// ==============================
// LOAD DATA (PAGINADO)
// ==============================
async function carregar(){
  try{
    loading(true)

    let pagina = 0
    let all = []

    while(true){
      const { data, error } = await _sb
        .from('tbl_baselaudo')
        .select('*')
        .range(pagina * CONFIG.PAGE_SIZE, (pagina+1)*CONFIG.PAGE_SIZE-1)

      if(error) throw error
      if(!data.length) break

      all = all.concat(data)

      if(data.length < CONFIG.PAGE_SIZE) break
      pagina++
    }

    state.dados = all
    aplicarFiltros()

  }catch(e){
    erro('Erro ao carregar dados', e)
  }finally{
    loading(false)
  }
}

// ==============================
// FILTROS
// ==============================
function aplicarFiltros(){
  state.filtrado = state.dados.filter(r=>{
    if(state.filtros.filial && r.Filial !== state.filtros.filial) return false
    if(state.filtros.status && r.Andamento !== state.filtros.status) return false
    return true
  })

  atualizarUI()
}

// ==============================
// UI UPDATE
// ==============================
function atualizarUI(){
  atualizarMetricas()
  atualizarGraficos()
}

// ==============================
// MÉTRICAS
// ==============================
function atualizarMetricas(){
  const total = state.filtrado.length
  const pend = state.filtrado.filter(r=>r.Andamento==='Pendente').length
  const conc = state.filtrado.filter(r=>r.Andamento==='Concluído').length

  setText('mTotal', total)
  setText('mPend', pend)
  setText('mConc', conc)
}

// ==============================
// GRÁFICOS OTIMIZADOS
// ==============================
function atualizarGraficos(){
  const statusMap = {}

  state.filtrado.forEach(r=>{
    const s = r.Andamento || 'N/D'
    statusMap[s] = (statusMap[s] || 0) + 1
  })

  renderDonut('cStatus', statusMap)
}

// ==============================
// DONUT (UPDATE INTELIGENTE)
// ==============================
function renderDonut(id, data){
  const ctx = document.getElementById(id)
  if(!ctx) return

  const labels = Object.keys(data)
  const values = Object.values(data)

  if(state.charts[id]){
    state.charts[id].data.labels = labels
    state.charts[id].data.datasets[0].data = values
    state.charts[id].update()
    return
  }

  state.charts[id] = new Chart(ctx,{
    type:'doughnut',
    data:{
      labels,
      datasets:[{
        data: values,
        backgroundColor:[
          '#3fb950','#d29922','#2f81f7','#f85149','#484f58'
        ]
      }]
    }
  })
}

// ==============================
// AUTO REFRESH (CORRIGIDO)
// ==============================
function startAutoRefresh(){
  if(state.autoRefresh) return

  state.autoRefresh = setInterval(()=>{
    console.log('Auto refresh...')
    carregar()
  }, CONFIG.AUTO_REFRESH)
}

// ==============================
// UTIL
// ==============================
function setText(id, v){
  document.getElementById(id).textContent =
    (v || 0).toLocaleString('pt-BR')
}

function loading(on){
  document.getElementById('totalLabel').textContent =
    on ? 'carregando...' : state.dados.length + ' registros'
}

function erro(msg, e){
  console.error(msg, e)
  alert(msg)
}
</script>
